apiVersion: v1
kind: Namespace
metadata:
  name: ynx-quant-testnet
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quant-state
  namespace: ynx-quant-testnet
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: {storage: 5Gi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-core
  namespace: ynx-quant-testnet
spec:
  replicas: 1
  selector: {matchLabels: {app: quant-core}}
  template:
    metadata: {labels: {app: quant-core}}
    spec:
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: quantd
          image: ynx-quant:testnet-candidate
          imagePullPolicy: IfNotPresent
          args: ["/usr/local/bin/ynx-quantd"]
          env:
            - {name: YNX_QUANT_HTTP_ADDR, value: "0.0.0.0:6444"}
            - {name: YNX_QUANT_STATE_PATH, value: "/var/lib/ynx-quant/state.json"}
          ports: [{name: api, containerPort: 6444}]
          readinessProbe: {httpGet: {path: /health, port: api}, initialDelaySeconds: 2, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /health, port: api}, initialDelaySeconds: 5, periodSeconds: 20}
          resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: "1", memory: 512Mi}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: state, mountPath: /var/lib/ynx-quant}]
        - name: worker
          image: ynx-quant:testnet-candidate
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/ynx-quant-worker"]
          env:
            - {name: YNX_QUANT_STATE_PATH, value: "/var/lib/ynx-quant/state.json"}
            - {name: YNX_QUANT_JOB_INBOX, value: "/var/lib/ynx-quant/inbox"}
            - {name: YNX_QUANT_JOB_OUTBOX, value: "/var/lib/ynx-quant/outbox"}
          resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: "1", memory: 512Mi}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: state, mountPath: /var/lib/ynx-quant}]
      volumes: [{name: state, persistentVolumeClaim: {claimName: quant-state}}]
---
apiVersion: v1
kind: Service
metadata:
  name: quant-api
  namespace: ynx-quant-testnet
spec:
  selector: {app: quant-core}
  ports: [{name: http, port: 6444, targetPort: api}]
