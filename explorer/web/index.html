<!doctype html><html><head><meta charset="utf-8"><title>YNX Explorer</title><style>body{font-family:Inter,Arial,sans-serif;margin:0;color:#061133;background:#fff}.bar{background:#002FA7;color:white;padding:18px 24px}.wrap{padding:24px;max-width:1120px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.card{border:1px solid #d9e2ff;border-radius:8px;padding:16px}</style></head><body><div class="bar"><h1>YNX Explorer</h1></div><main class="wrap"><div id="status">Loading real API status...</div><div class="grid" id="grid"></div></main><script>const api=localStorage.getItem('YNX_API_URL')||'http://127.0.0.1:6420';fetch(api+'/explorer/summary').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(s=>{status.textContent='Connected to '+s.network.name;grid.innerHTML=['height','latestBlockHash','totalTransactions','validatorCount','payIntentCount'].map(k=>'<section class=card><b>'+k+'</b><p>'+s[k]+'</p></section>').join('')}).catch(e=>{status.textContent='Service unavailable: '+api+'/explorer/summary '+e.message})</script></body></html>
