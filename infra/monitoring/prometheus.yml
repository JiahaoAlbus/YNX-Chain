global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/ynx-alerts.yml

scrape_configs:
  - job_name: ynx-chaind
    metrics_path: /metrics
    static_configs:
      - targets:
          - ynx-chaind:6420
        labels:
          network: ynx-testnet
          service: ynx-chaind
  - job_name: ynx-indexerd
    metrics_path: /metrics
    static_configs:
      - targets:
          - ynx-indexerd:6426
        labels:
          network: ynx-testnet
          service: ynx-indexerd
