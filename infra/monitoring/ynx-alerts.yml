groups:
  - name: ynx-chain-testnet
    rules:
      - alert: YNXChainMetricsDown
        expr: up{job="ynx-chaind"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: YNX Chain metrics endpoint is unreachable
          description: Prometheus cannot scrape /metrics from ynx-chaind.
      - alert: YNXChainNoBlockProgress
        expr: increase(ynx_chain_height{job="ynx-chaind"}[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: YNX Chain block height is not advancing
          description: Block height has not increased over the last five minutes.
      - alert: YNXChainPersistenceError
        expr: ynx_chain_persistence_error{job="ynx-chaind"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: YNX Chain persistence layer reports an error
          description: Node metrics report a persistence error. Check journal logs and backup state before restart.
      - alert: YNXFollowerReplicationDegraded
        expr: ynx_chain_replication_configured{job="ynx-chaind"} == 1 and ynx_chain_replication_fresh{job="ynx-chaind"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: YNX authoritative follower replication is not fresh
          description: The follower has not recently completed authenticated exact source convergence. Inspect lifecycle state, source reachability, HMAC validation, and local persistence before restart.
      - alert: YNXFollowerReplicationCatchingUp
        expr: ynx_chain_replication_configured{job="ynx-chaind"} == 1 and ynx_chain_replication_catching_up{job="ynx-chaind"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: YNX authoritative follower remains in catching-up state
          description: The follower has not returned to a fresh exact source height and block hash for five minutes.
      - alert: YNXFollowerReplicationLagging
        expr: ynx_chain_replication_configured{job="ynx-chaind"} == 1 and ynx_chain_replication_lag_blocks{job="ynx-chaind"} > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: YNX authoritative follower is behind the producer
          description: Authenticated source height exceeds local follower height by more than three blocks.
      - alert: YNXFollowerReplicationFailures
        expr: increase(ynx_chain_replication_failures_total{job="ynx-chaind"}[5m]) > 0 or ynx_chain_replication_consecutive_failures{job="ynx-chaind"} > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: YNX authoritative follower replication is failing
          description: At least one replication attempt failed or the follower still has consecutive failures. Inspect bounded runtime stage/error evidence without exposing replication credentials.
      - alert: YNXIndexerLagging
        expr: ynx_indexer_sync_lag_blocks{job="ynx-indexerd"} > 3
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: YNX indexer is behind the RPC source
          description: Indexer sync lag is above three blocks for more than three minutes.
      - alert: YNXIndexerErrors
        expr: increase(ynx_indexer_sync_errors_total{job="ynx-indexerd"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: YNX indexer reports sync errors
          description: The indexer failed at least one sync cycle in the last five minutes.
      - alert: YNXExplorerDown
        expr: up{job="ynx-explorerd"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: YNX explorer metrics endpoint is unreachable
          description: Prometheus cannot scrape /metrics from ynx-explorerd.
      - alert: YNXExplorerLagging
        expr: ynx_explorer_sync_lag_blocks{job="ynx-explorerd"} > 3
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: YNX explorer is serving stale indexed data
          description: Explorer sees an RPC-to-indexer lag above three blocks for more than three minutes.
      - alert: YNXEconomicsDisclosureErrors
        expr: increase(ynx_explorer_economics_disclosure_errors_total{job="ynx-explorerd"}[5m]) / clamp_min(increase(ynx_explorer_economics_disclosure_requests_total{job="ynx-explorerd"}[5m]), 1) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: YNXT economics disclosure error ratio is elevated
          description: More than one percent of disclosure requests failed for five minutes. Correlate Request, Trace and Error IDs before rollback.
      - alert: YNXEconomicsDisclosureLatency
        expr: histogram_quantile(0.99, sum by (le) (rate(ynx_explorer_economics_disclosure_latency_seconds_bucket{job="ynx-explorerd"}[5m]))) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: YNXT economics disclosure p99 exceeds one second
          description: Process latency has remained above the candidate p99 threshold for ten minutes; verify ingress and instance saturation separately.
      - alert: YNXEconomicsDisclosureStale
        expr: time() - ynx_explorer_economics_disclosure_last_success_timestamp_seconds{job="ynx-explorerd"} > 300
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: YNXT economics disclosure has no recent success
          description: No successful disclosure response has been observed for more than five minutes.
      - alert: YNXFaucetDown
        expr: up{job="ynx-faucetd"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: YNX faucet metrics endpoint is unreachable
          description: Prometheus cannot scrape /metrics from ynx-faucetd.
      - alert: YNXFaucetHighDenials
        expr: increase(ynx_faucet_denied_total{job="ynx-faucetd"}[10m]) > 20
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: YNX faucet is rejecting many requests
          description: Faucet denials or rate limits are elevated. Check request logs for abuse or misconfiguration.
      - alert: YNXAIGatewayDown
        expr: up{job="ynx-ai-gatewayd"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: YNX AI Gateway metrics endpoint is unreachable
          description: Prometheus cannot scrape /metrics from ynx-ai-gatewayd.
      - alert: YNXAIGatewayErrors
        expr: increase(ynx_ai_gateway_errors_total{job="ynx-ai-gatewayd"}[10m]) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: YNX AI Gateway provider or chain errors are elevated
          description: Check provider reachability, chain status, and the redacted AI Gateway audit log.
      - alert: YNXPayGatewayDown
        expr: up{job="ynx-payd"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: YNX Pay Gateway metrics endpoint is unreachable
          description: Prometheus cannot scrape /metrics from ynx-payd.
      - alert: YNXPayGatewayErrors
        expr: increase(ynx_pay_gateway_errors_total{job="ynx-payd"}[10m]) > 5 or increase(ynx_pay_gateway_audit_errors_total{job="ynx-payd"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: YNX Pay Gateway upstream or audit errors are elevated
          description: Check chain reachability and the protected Pay Gateway audit log.
      - alert: YNXTrustGatewayDown
        expr: up{job="ynx-trustd"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: YNX Trust Gateway metrics endpoint is unreachable
          description: Prometheus cannot scrape /metrics from ynx-trustd.
      - alert: YNXTrustGatewayErrors
        expr: increase(ynx_trust_gateway_errors_total{job="ynx-trustd"}[10m]) > 5 or increase(ynx_trust_gateway_audit_errors_total{job="ynx-trustd"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: YNX Trust Gateway upstream or audit errors are elevated
          description: Check chain reachability and the protected Trust Gateway audit log.
      - alert: YNXResourceGatewayDown
        expr: up{job="ynx-resourced"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: YNX Resource Market Gateway metrics endpoint is unreachable
          description: Prometheus cannot scrape /metrics from ynx-resourced.
      - alert: YNXResourceGatewayErrors
        expr: increase(ynx_resource_gateway_errors_total{job="ynx-resourced"}[10m]) > 5 or increase(ynx_resource_gateway_audit_errors_total{job="ynx-resourced"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: YNX Resource Market Gateway upstream or audit errors are elevated
          description: Check chain reachability and the protected Resource Market audit log.
