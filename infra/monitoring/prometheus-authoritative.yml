global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/ynx/prometheus/ynx-alerts.yml

scrape_configs:
  - job_name: ynx-chaind
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:6420
        labels:
          network: ynx-testnet
          service: ynx-chaind
          role: primary
          transport: loopback
      - targets:
          - 10.77.42.2:6420
        labels:
          network: ynx-testnet
          service: ynx-chaind
          role: singapore
          transport: wireguard
      - targets:
          - 10.77.42.3:6420
        labels:
          network: ynx-testnet
          service: ynx-chaind
          role: silicon-valley
          transport: wireguard
      - targets:
          - 10.77.42.4:6420
        labels:
          network: ynx-testnet
          service: ynx-chaind
          role: seoul
          transport: wireguard

