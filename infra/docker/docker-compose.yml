services:
  ynx-chaind:
    build:
      context: ../..
      dockerfile: infra/docker/ynx-chaind.Dockerfile
    environment:
      YNX_NETWORK: devnet
      YNX_HTTP_ADDR: 0.0.0.0:6420
      YNX_AI_GATEWAY_UPSTREAM_KEY: "${YNX_AI_GATEWAY_UPSTREAM_KEY:?Missing required env: YNX_AI_GATEWAY_UPSTREAM_KEY}"
      YNX_PAY_GATEWAY_UPSTREAM_KEY: "${YNX_PAY_GATEWAY_UPSTREAM_KEY:?Missing required env: YNX_PAY_GATEWAY_UPSTREAM_KEY}"
    ports:
      - "6420:6420"

  ynx-indexerd:
    build:
      context: ../..
      dockerfile: infra/docker/ynx-indexerd.Dockerfile
    depends_on:
      - ynx-chaind
    environment:
      YNX_INDEXER_RPC_URL: http://ynx-chaind:6420
      YNX_INDEXER_HTTP_ADDR: 0.0.0.0:6426
      YNX_INDEXER_DB_PATH: /var/lib/ynx-indexer/indexer-db.json
    ports:
      - "6426:6426"
    volumes:
      - ynx-indexer-data:/var/lib/ynx-indexer

  ynx-explorerd:
    build:
      context: ../..
      dockerfile: infra/docker/ynx-explorerd.Dockerfile
    depends_on:
      - ynx-chaind
      - ynx-indexerd
    environment:
      YNX_EXPLORER_RPC_URL: http://ynx-chaind:6420
      YNX_EXPLORER_INDEXER_URL: http://ynx-indexerd:6426
      YNX_EXPLORER_HTTP_ADDR: 0.0.0.0:6427
      YNX_EXPLORER_PUBLIC_RPC_URL: http://127.0.0.1:6420
      YNX_EXPLORER_PUBLIC_URL: http://127.0.0.1:6427
    ports:
      - "6427:6427"

  ynx-faucetd:
    build:
      context: ../..
      dockerfile: infra/docker/ynx-faucetd.Dockerfile
    depends_on:
      - ynx-chaind
    environment:
      FAUCET_PRIVATE_KEY: local-compose-faucet-key
      YNX_FAUCET_RPC_URL: http://ynx-chaind:6420
      YNX_FAUCET_HTTP_ADDR: 0.0.0.0:6428
      YNX_FAUCET_REQUEST_LOG: /var/log/ynx-faucet/requests.jsonl
      YNX_FAUCET_DEFAULT_AMOUNT: "100"
      YNX_FAUCET_MAX_AMOUNT: "100"
      YNX_FAUCET_RATE_LIMIT_WINDOW: 1h
      YNX_FAUCET_RATE_LIMIT_MAX: "1"
    ports:
      - "6428:6428"
    volumes:
      - ynx-faucet-logs:/var/log/ynx-faucet

  ynx-ai-gatewayd:
    build:
      context: ../..
      dockerfile: infra/docker/ynx-ai-gatewayd.Dockerfile
    depends_on:
      - ynx-chaind
    environment:
      YNX_AI_GATEWAY_CHAIN_URL: http://ynx-chaind:6420
      YNX_AI_GATEWAY_HTTP_ADDR: 0.0.0.0:6429
      YNX_AI_PROVIDER_URL: ${YNX_AI_PROVIDER_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: "${OPENAI_API_KEY:?Missing required env: OPENAI_API_KEY}"
      AI_MODEL_NAME: "${AI_MODEL_NAME:?Missing required env: AI_MODEL_NAME}"
      YNX_AI_GATEWAY_API_KEY: "${YNX_AI_GATEWAY_API_KEY:?Missing required env: YNX_AI_GATEWAY_API_KEY}"
      YNX_AI_GATEWAY_UPSTREAM_KEY: "${YNX_AI_GATEWAY_UPSTREAM_KEY:?Missing required env: YNX_AI_GATEWAY_UPSTREAM_KEY}"
      YNX_AI_GATEWAY_AUDIT_LOG: /var/log/ynx-ai-gateway/audit.jsonl
      YNX_AI_GATEWAY_RATE_LIMIT_WINDOW: 1m
      YNX_AI_GATEWAY_RATE_LIMIT_MAX: "30"
    ports:
      - "6429:6429"
    volumes:
      - ynx-ai-gateway-logs:/var/log/ynx-ai-gateway

  ynx-payd:
    build:
      context: ../..
      dockerfile: infra/docker/ynx-payd.Dockerfile
    depends_on:
      - ynx-chaind
    environment:
      YNX_PAY_GATEWAY_CHAIN_URL: http://ynx-chaind:6420
      YNX_PAY_GATEWAY_HTTP_ADDR: 0.0.0.0:6430
      YNX_PAY_MERCHANT_ID: "${YNX_PAY_MERCHANT_ID:?Missing required env: YNX_PAY_MERCHANT_ID}"
      YNX_PAY_API_KEY: "${YNX_PAY_API_KEY:?Missing required env: YNX_PAY_API_KEY}"
      YNX_PAY_GATEWAY_UPSTREAM_KEY: "${YNX_PAY_GATEWAY_UPSTREAM_KEY:?Missing required env: YNX_PAY_GATEWAY_UPSTREAM_KEY}"
      YNX_PAY_WEBHOOK_SIGNING_KEY: "${YNX_PAY_WEBHOOK_SIGNING_KEY:?Missing required env: YNX_PAY_WEBHOOK_SIGNING_KEY}"
      YNX_PAY_GATEWAY_AUDIT_LOG: /var/log/ynx-pay/audit.jsonl
      YNX_PAY_GATEWAY_RATE_LIMIT_WINDOW: 1m
      YNX_PAY_GATEWAY_RATE_LIMIT_MAX: "60"
    ports:
      - "6430:6430"
    volumes:
      - ynx-pay-logs:/var/log/ynx-pay

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      - ynx-chaind
      - ynx-indexerd
      - ynx-explorerd
      - ynx-faucetd
      - ynx-ai-gatewayd
      - ynx-payd
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/ynx-alerts.yml:/etc/prometheus/rules/ynx-alerts.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.5.2
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${MONITORING_ADMIN_PASSWORD:?Missing required env: MONITORING_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/ynx-chain-testnet.json:ro
    ports:
      - "3000:3000"

volumes:
  ynx-indexer-data:
  ynx-faucet-logs:
  ynx-ai-gateway-logs:
  ynx-pay-logs:
