name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: make env-check
      - run: make no-placeholder-check
      - run: make secret-scan
      - run: make static-check
      - run: make test
      - run: make economics-local-candidate-check
      - run: make contract-tooling-check
      - run: make monitoring-check
      - run: make indexer-check
      - run: make explorer-check
      - run: make faucet-check
      - run: make deploy-dry-run
      - run: make smoke-test
      - run: make grant-package
      - run: make ecosystem-package
      - run: make exchange-package
      - run: make mainnet-readiness
