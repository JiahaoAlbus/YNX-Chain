name: governance

on:
  push:
    branches: [main, codex/final-governance]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  governance-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Verify governance control plane
        run: bash ./scripts/verify/governance-check.sh
