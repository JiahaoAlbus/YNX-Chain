name: wallet-ios

on:
  push:
    branches: [main, codex/ecosystem-wallet-auth]
    paths: ["apps/wallet/**", "packages/wallet-auth/**", ".github/workflows/wallet-ios.yml"]
  pull_request:
    paths: ["apps/wallet/**", "packages/wallet-auth/**", ".github/workflows/wallet-ios.yml"]

jobs:
  simulator-build:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            packages/wallet-auth/package-lock.json
            apps/wallet/package-lock.json
      - run: npm ci
        working-directory: packages/wallet-auth
      - run: npm test
        working-directory: packages/wallet-auth
      - run: npm ci
        working-directory: apps/wallet
      - run: npm run check
        working-directory: apps/wallet
      - run: npx pod-install ios
        working-directory: apps/wallet
      - name: Build unsigned iOS Simulator app
        working-directory: apps/wallet
        run: >-
          xcodebuild -workspace ios/YNXWallet.xcworkspace -scheme YNXWallet
          -configuration Release -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO clean build
      - name: Install, cold launch and verify Wallet deep link
        working-directory: apps/wallet
        run: |
          set -euo pipefail
          APP="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path '*/Build/Products/Release-iphonesimulator/YNXWallet.app' -print -quit)"
          DEVICE="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/{print $2; exit}')"
          test -n "$APP"
          test -n "$DEVICE"
          mkdir -p proof/ci-ios
          xcrun simctl shutdown "$DEVICE" 2>/dev/null || true
          xcrun simctl boot "$DEVICE"
          xcrun simctl bootstatus "$DEVICE" -b
          xcrun simctl install "$DEVICE" "$APP"
          xcrun simctl terminate "$DEVICE" com.ynxweb4.wallet 2>/dev/null || true
          xcrun simctl launch "$DEVICE" com.ynxweb4.wallet | tee proof/ci-ios/cold-launch.txt
          xcrun simctl get_app_container "$DEVICE" com.ynxweb4.wallet | tee proof/ci-ios/app-container.txt
          xcrun simctl openurl "$DEVICE" 'ynxwallet://authorize?request=invalid' | tee proof/ci-ios/deep-link.txt
          xcrun simctl io "$DEVICE" screenshot proof/ci-ios/wallet-deep-link-rejection.png
      - uses: actions/upload-artifact@v4
        with:
          name: ynx-wallet-ios-simulator
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphonesimulator/YNXWallet.app
            apps/wallet/proof/ci-ios
          if-no-files-found: error
