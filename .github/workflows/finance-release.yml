name: YNX Finance release evidence

on:
  workflow_dispatch:
  push:
    branches: [codex/ecosystem-finance]
    paths:
      - 'apps/finance/**'
      - 'internal/finance/**'
      - 'packages/wallet-auth/**'
      - '.github/workflows/finance-release.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version-file: go.mod}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            packages/wallet-auth/package-lock.json
            apps/finance/gateway/package-lock.json
            apps/finance/mobile/package-lock.json
      - run: go test ./internal/finance ./apps/finance/cmd/server
      - run: npm ci && npm test
        working-directory: packages/wallet-auth
      - run: npm ci && npm test
        working-directory: apps/finance/gateway
      - run: npm test
        working-directory: apps/finance
      - run: npm ci && npm run typecheck && npm test && npm run bundle-check
        working-directory: apps/finance/mobile

  android-installable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '24'}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - uses: android-actions/setup-android@v3
      - run: npm ci
        working-directory: packages/wallet-auth
      - run: npm ci
        working-directory: apps/finance/mobile
      - name: Create local test-only Android signing key
        run: keytool -genkeypair -storetype PKCS12 -keystore android/app/debug.keystore -alias androiddebugkey -storepass android -keypass android -dname "CN=YNX Finance Local Test,O=YNX Testnet,C=US" -keyalg RSA -keysize 2048 -validity 10000
        working-directory: apps/finance/mobile
      - run: ./gradlew assembleRelease --no-daemon
        working-directory: apps/finance/mobile/android
      - uses: actions/upload-artifact@v4
        with:
          name: ynx-finance-android-test-signed
          path: apps/finance/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  ios-simulator-cold-launch:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Swift 6.2 toolchain
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer && xcodebuild -version && swift --version
      - uses: actions/setup-node@v4
        with: {node-version: '24'}
      - run: npm ci
        working-directory: packages/wallet-auth
      - run: npm ci
        working-directory: apps/finance/mobile
      - run: npx expo prebuild --platform ios --no-install
        working-directory: apps/finance/mobile
      - run: pod install
        working-directory: apps/finance/mobile/ios
      - name: Build unsigned Simulator app
        run: xcodebuild -workspace YNXFinance.xcworkspace -scheme YNXFinance -configuration Release -sdk iphonesimulator -derivedDataPath build CODE_SIGNING_ALLOWED=NO build
        working-directory: apps/finance/mobile/ios
      - name: Install and cold launch
        run: |
          udid=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; print(next(x["udid"] for values in d.values() for x in values if x.get("isAvailable") and "iPhone" in x["name"]))')
          xcrun simctl boot "$udid" || true
          open -a Simulator
          xcrun simctl bootstatus "$udid" -b
          xcrun simctl install "$udid" ios/build/Build/Products/Release-iphonesimulator/YNXFinance.app
          xcrun simctl terminate "$udid" com.ynxweb4.finance || true
          xcrun simctl launch --console "$udid" com.ynxweb4.finance > ios/build/cold-launch.log 2>&1 &
          sleep 8
          xcrun simctl io "$udid" screenshot ios/build/finance-ios-simulator.png
          xcrun simctl get_app_container "$udid" com.ynxweb4.finance
        working-directory: apps/finance/mobile
      - uses: actions/upload-artifact@v4
        with:
          name: ynx-finance-ios-simulator-evidence
          path: |
            apps/finance/mobile/ios/build/finance-ios-simulator.png
            apps/finance/mobile/ios/build/cold-launch.log
          if-no-files-found: error
