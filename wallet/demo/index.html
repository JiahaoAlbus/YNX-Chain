<!doctype html><html><head><meta charset="utf-8"><title>Add YNX Testnet</title></head><body><button id="add">Add YNX Testnet to MetaMask</button><button id="switch">Switch to YNX Testnet</button><pre id="out"></pre><script>const chain={chainId:'0x1917',chainName:'YNX Testnet',nativeCurrency:{name:'YNXT',symbol:'YNXT',decimals:18},rpcUrls:[],blockExplorerUrls:[]};add.onclick=async()=>{try{await ethereum.request({method:'wallet_addEthereumChain',params:[chain]});out.textContent='added'}catch(e){out.textContent=e.message}};switch.onclick=async()=>{try{await ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:chain.chainId}]});out.textContent='switched'}catch(e){out.textContent=e.message}}</script></body></html>
